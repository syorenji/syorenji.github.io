<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日蓮宗 天鼓山 昭蓮寺</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:#f6f3ee;
      color:#1f1a17;
      font-family:
        "Hiragino Mincho ProN",
        "Yu Mincho",
        "Noto Serif JP",
        serif;
    }

    .card{
      width:100%;
      max-width:520px;
      background:#fff;
      border:1px solid rgba(0,0,0,0.08);
      border-radius:24px;
      box-shadow:0 12px 40px rgba(0,0,0,0.08);
      text-align:center;
      padding:32px 24px 36px;
    }

    .avatar{
      width:min(58vw, 240px);
      aspect-ratio:1 / 1;
      margin:0 auto 24px;
      border-radius:50%;
      overflow:hidden;
      box-shadow:0 8px 24px rgba(0,0,0,0.10);
      background:#ddd;
    }

    .avatar img{
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
      object-position:center 28%;
    }

    .eyebrow{
      font-size:0.82rem;
      letter-spacing:0.18em;
      color:#6f665e;
      margin:0 0 10px;
    }

    h1{
      margin:0;
      font-size:clamp(1.7rem, 5vw, 2.2rem);
      font-weight:600;
      line-height:1.4;
    }

    .sub{
      margin:10px 0 0;
      font-size:1rem;
      line-height:1.9;
      color:#6f665e;
    }

    .coming{
      margin:28px auto 0;
      display:inline-block;
      padding:10px 18px;
      border:1px solid rgba(0,0,0,0.12);
      border-radius:999px;
      font-size:0.95rem;
      letter-spacing:0.08em;
      background:#fff;
    }
  </style>
</head>
<body>
  <section class="card">
    <div class="avatar">
      <img src="img/yudai.png" alt="昭蓮寺 ご住職" />
    </div>

    <p class="eyebrow">日蓮宗 天鼓山</p>
    <h1>昭蓮寺</h1>
    <p class="sub">公式ウェブサイト準備中</p>
    <div class="coming">Coming Soon...</div>
  </section>
</body>
</html>
